<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="Figuras alcanzando los Objetivos de Desarrollo Sostenible">
  <!-- Observatorio Legislativo MX · hero institucional: manchas anónimas en colores ODS -->
  <rect width="1200" height="520" fill="#FFFFFF"/>

  <!-- línea de piso -->
  <line x1="80" y1="452" x2="1120" y2="452" stroke="#E6E4DE" stroke-width="2"/>

  <!-- sombras planas -->
  <ellipse cx="215" cy="452" rx="98" ry="10" fill="#F2F0EB"/>
  <ellipse cx="540" cy="452" rx="180" ry="11" fill="#F2F0EB"/>
  <ellipse cx="905" cy="452" rx="120" ry="10" fill="#F2F0EB"/>

  <!-- ══ ANILLO ODS (la meta, arriba derecha) ══ -->
  <g id="anillo-ods" transform="translate(1015,140)">
    <path d="M 0.9 -64.0 A 64 64 0 0 1 22.3 -60.0 L 15.3 -41.2 A 44 44 0 0 0 0.6 -44.0 Z" fill="#e5243b"/>
    <path d="M 24.0 -59.3 A 64 64 0 0 1 42.5 -47.9 L 29.2 -32.9 A 44 44 0 0 0 16.5 -40.8 Z" fill="#dda63a"/>
    <path d="M 43.8 -46.7 A 64 64 0 0 1 56.9 -29.3 L 39.1 -20.2 A 44 44 0 0 0 30.1 -32.1 Z" fill="#4c9f38"/>
    <path d="M 57.7 -27.7 A 64 64 0 0 1 63.6 -6.8 L 43.8 -4.7 A 44 44 0 0 0 39.7 -19.1 Z" fill="#c5192d"/>
    <path d="M 63.8 -5.0 A 64 64 0 0 1 61.8 16.7 L 42.5 11.4 A 44 44 0 0 0 43.9 -3.4 Z" fill="#ff3a21"/>
    <path d="M 61.3 18.4 A 64 64 0 0 1 51.6 37.9 L 35.5 26.0 A 44 44 0 0 0 42.1 12.6 Z" fill="#26bde2"/>
    <path d="M 50.5 39.3 A 64 64 0 0 1 34.4 53.9 L 23.7 37.1 A 44 44 0 0 0 34.7 27.0 Z" fill="#fcc30b"/>
    <path d="M 32.9 54.9 A 64 64 0 0 1 12.6 62.7 L 8.7 43.1 A 44 44 0 0 0 22.6 37.7 Z" fill="#a21942"/>
    <path d="M 10.9 63.1 A 64 64 0 0 1 -10.9 63.1 L -7.5 43.4 A 44 44 0 0 0 7.5 43.4 Z" fill="#fd6925"/>
    <path d="M -12.6 62.7 A 64 64 0 0 1 -32.9 54.9 L -22.6 37.7 A 44 44 0 0 0 -8.7 43.1 Z" fill="#dd1367"/>
    <path d="M -34.4 53.9 A 64 64 0 0 1 -50.5 39.3 L -34.7 27.0 A 44 44 0 0 0 -23.7 37.1 Z" fill="#fd9d24"/>
    <path d="M -51.6 37.9 A 64 64 0 0 1 -61.3 18.4 L -42.1 12.6 A 44 44 0 0 0 -35.5 26.0 Z" fill="#bf8b2e"/>
    <path d="M -61.8 16.7 A 64 64 0 0 1 -63.8 -5.0 L -43.9 -3.4 A 44 44 0 0 0 -42.5 11.4 Z" fill="#3f7e44"/>
    <path d="M -63.6 -6.8 A 64 64 0 0 1 -57.7 -27.7 L -39.7 -19.1 A 44 44 0 0 0 -43.8 -4.7 Z" fill="#0a97d9"/>
    <path d="M -56.9 -29.3 A 64 64 0 0 1 -43.8 -46.7 L -30.1 -32.1 A 44 44 0 0 0 -39.1 -20.2 Z" fill="#56c02b"/>
    <path d="M -42.5 -47.9 A 64 64 0 0 1 -24.0 -59.3 L -16.5 -40.8 A 44 44 0 0 0 -29.2 -32.9 Z" fill="#00689d"/>
    <path d="M -22.3 -60.0 A 64 64 0 0 1 -0.9 -64.0 L -0.6 -44.0 A 44 44 0 0 0 -15.3 -41.2 Z" fill="#19486a"/>
  </g>

  <!-- ══ GRUPO IZQUIERDO: dos figuras, una eleva a la otra (id=apoyo) ══ -->
  <g id="apoyo">
    <!-- figura base: ODS 16 azul, ancha, estable -->
    <path d="M 215 452 C 168 452 152 414 158 372 C 164 330 186 306 216 307 C 248 308 270 334 268 376 C 266 420 254 452 215 452 Z" fill="#00689d"/>
    <!-- figura elevada: ODS 5 naranja-rojo, inclinada hacia el anillo -->
    <path d="M 236 312 C 206 308 196 284 202 254 C 208 224 226 206 250 210 C 274 214 284 238 278 268 C 272 296 262 316 236 312 Z" fill="#ff3a21"/>
  </g>

  <!-- ══ GRUPO CENTRAL: escalinata neutra con dos figuras ascendiendo (id=ascenso) ══ -->
  <g id="ascenso">
    <rect x="420" y="392" width="84" height="60" rx="6" fill="#EDEBE5"/>
    <rect x="516" y="342" width="84" height="110" rx="6" fill="#E3E1DA"/>
    <rect x="612" y="282" width="84" height="170" rx="6" fill="#D9D7CF"/>
    <!-- figura en el primer escalón: ODS 6 celeste -->
    <path d="M 462 392 C 438 392 430 372 434 348 C 438 326 452 312 468 314 C 486 316 494 334 490 358 C 487 380 480 392 462 392 Z" fill="#26bde2"/>
    <!-- figura en el escalón alto, estirada hacia arriba: ODS 13 verde -->
    <path d="M 654 282 C 630 282 622 258 626 226 C 629 200 640 182 656 184 C 674 186 682 208 678 240 C 675 266 670 282 654 282 Z" fill="#3f7e44"/>
  </g>

  <!-- ══ GRUPO DERECHO: apilamiento de tres piedras que toca el anillo (id=alcance, v6.2 §0) ══ -->
  <g id="alcance">
    <!-- piedra base: ODS 8 vino -->
    <path d="M 900 451 C 862 451 836 435 836 412 C 836 389 864 373 900 373 C 936 373 964 389 964 412 C 964 435 936 451 900 451 Z" fill="#a21942"/>
    <!-- piedra media: ODS 14 azul -->
    <path d="M 902 366 C 874 366 850 352 850 332 C 850 312 874 298 902 298 C 930 298 954 312 954 332 C 954 352 930 366 902 366 Z" fill="#0a97d9"/>
    <!-- piedra alta: ODS 7 amarilla, se estira hasta tocar el anillo -->
    <path d="M 928 290 C 902 286 880 274 882 250 C 884 224 912 200 942 206 C 978 213 998 235 990 260 C 984 278 954 294 928 290 Z" fill="#fcc30b"/>
  </g>

  <!-- puntos de conexión discretos entre grupos y anillo -->
  <g stroke="#C9C7BF" stroke-width="2.5" stroke-dasharray="1 10" stroke-linecap="round" fill="none">
    <path d="M 262 300 C 330 240 400 210 470 300"/>
    <path d="M 680 220 C 760 160 850 150 935 165"/>
  </g>
</svg>
