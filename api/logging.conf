[loggers]
keys=root,tipi_backend,uvicorn.error,uvicorn.access

[handlers]
keys=console

[formatters]
keys=simple

[logger_root]
level=DEBUG
handlers=console

[logger_tipi_backend]
level=DEBUG
handlers=console
qualname=tipi_backend
propagate=0

[logger_uvicorn.error]
level=INFO
handlers=console
propagate=1
qualname=uvicorn.error

[logger_uvicorn.access]
level=INFO
handlers=console
propagate=0
qualname=uvicorn.access

[handler_console]
class=StreamHandler
level=DEBUG
formatter=simple
args=(sys.stdout,)

[formatter_simple]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=
