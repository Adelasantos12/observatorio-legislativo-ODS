# Stack completo de desarrollo: mongo + redis + api + worker + frontend
# Uso: docker compose up --build
# La base arranca vacía: cargar el diccionario con
#   docker compose exec api python /app/knowledgebase/load_kb.py
services:
  mongo:
    image: mongo:7
    container_name: mx-mongo
    # tipi_data siempre conecta con credenciales (usuario/clave qhld, authSource
    # admin por defecto), así que el servidor debe tener control de acceso activo.
    environment:
      - MONGO_INITDB_ROOT_USERNAME=qhld
      - MONGO_INITDB_ROOT_PASSWORD=qhld
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7
    container_name: mx-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile-dev
    container_name: mx-api
    depends_on: [mongo, redis]
    environment:
      # tipi_data lee MONGO_DB_NAME / MONGO_USER / MONGO_PASSWORD (no MONGO_DB).
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB_NAME=mx
      - MONGO_USER=qhld
      - MONGO_PASSWORD=qhld
      - CACHE_REDIS_HOST=redis
      - BROKER=redis://redis:6379/2
      - RESULT_BACKEND=redis://redis:6379/3
      - TAGGER_MAX_WORDS=5000
      - COUNTRY=mexico
    ports:
      - "8080:8080"
    volumes:
      - ./api:/app/api
      - ./packages:/app/packages
      - ./knowledgebase:/app/knowledgebase

  worker:
    build:
      context: .
      dockerfile: packages/qhld-tasks/Dockerfile-dev
    container_name: mx-worker
    depends_on: [mongo, redis]
    environment:
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB_NAME=mx
      - MONGO_USER=qhld
      - MONGO_PASSWORD=qhld
      - CACHE_REDIS_HOST=redis
      - BROKER=redis://redis:6379/2
      - RESULT_BACKEND=redis://redis:6379/3
    volumes:
      - ./packages:/app/packages

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile-mx
    container_name: mx-frontend
    depends_on: [api]
    ports:
      - "8070:80"
    volumes:
      - ./frontend/nginx-default.conf:/etc/nginx/conf.d/default.conf

volumes:
  mongo-data:

# NOTA para Claude Code: los Dockerfile-dev originales asumen repo suelto, no monorepo.
# Ajustar rutas COPY/WORKDIR es parte de la fase F0 del PLAN (docs/PLAN.md).
