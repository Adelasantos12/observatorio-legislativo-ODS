title: "Ley Aduanera"
short_title: "Ley Aduanera"
instrument_type: "Federal statute"
issuing_body: "Congreso de los Estados Unidos Mexicanos"
date: "1995-12-15"
source_file: "LAdua.pdf"
language: "Spanish"
jurisdiction: "Mexico"
status: "Texto vigente. Última reforma publicada en el Diario Oficial de la Federación el 19-11-2025; cantidades actualizadas por Reglas Generales de Comercio Exterior DOF 27-12-2025."
notes: "Federal customs statute regulating the entry and exit of goods from Mexican territory, customs clearance, customs authorities, foreign trade taxes, non-tariff regulations and restrictions, customs regimes, procedures, infractions and sanctions. Relevant for NormTrace-IHR insofar as it governs border control, customs procedures, import/export of goods, sanitary and other non-tariff restrictions, international cooperation, electronic customs systems, and exceptional imports/donations for health-related purposes."
