notes: >
  Complete 2025 version. Defines the organization, functioning, structure and competences of the
  Secretaría de Salud and its administrative units and deconcentrated bodies. Article 35 fraction XIX
  designates the Dirección General de Epidemiología as the RSI (IHR) national focal point liaison
  (enlace para el Reglamento Sanitario Internacional). Includes new units: Dirección General del
  Servicio Nacional de Salud Pública; Unidad de Acceso y Abasto de Insumos para la Salud. COFEPRIS
  listed as deconcentrated body (Art. 2 C frac. II). Previous partial reform files (DOF 2018-02-07
  and 2023-06-30) were moved to 99_archive/superseded_sources/ and must not be used as active
  corpus inputs. This is the active source for NormTrace-IHR.
